<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Skymaster X1 Pro | 4K Roof Inspection Drone</title>

<meta name="description" content="Skymaster X1 Pro drone for roof inspections. 4K camera, GPS stability, 35-minute flight time. Faster inspections, safer workflows, higher conversion rates." />
<meta name="robots" content="index, follow" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #0a0c15;
  color: #f5f7ff;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.hero {
  padding: 80px 20px;
  text-align: center;
}

h1 {
  font-size: 44px;
  margin-bottom: 10px;
}

p {
  opacity: 0.8;
  max-width: 700px;
  margin: auto;
}

.btn {
  margin-top: 20px;
  padding: 14px 26px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-weight: 700;
}

.primary {
  background: #2563eb;
  color: white;
}

.secondary {
  background: transparent;
  border: 1px solid #2563eb;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 20px;
  margin-top: 60px;
}

.card {
  background: rgba(255,255,255,0.03);
  padding: 20px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.08);
}

/* REMOVE ALL DECORATIVE “FLOWER / BACKGROUND SHAPES” */
</style>
</head>

<body>

<div class="container">

<section class="hero">
  <h1>Skymaster X1 Pro</h1>
  <p>Professional 4K drone for roof inspections. Faster quotes, safer inspections, higher close rates.</p>

  <button class="btn primary" id="buyBtn">Buy Now - $899</button>
  <button class="btn secondary" id="demoBtn">Request Demo</button>
</section>

<section class="grid">
  <div class="card">📷 4K Ultra HD Camera</div>
  <div class="card">🚁 35 Minute Flight Time</div>
  <div class="card">📡 GPS + Stability Lock</div>
  <div class="card">⚡ Fast Roof Inspections</div>
</section>

</div>

<script>
const API_URL = "https://your-api-url.com"; // FIX THIS

async function startCheckout() {
  try {
    const res = await fetch(`${API_URL}/create-checkout`, {
      method: "POST",
      headers: { "Content-Type": "application/json" }
    });

    const data = await res.json();

    if (!data?.url) {
      alert("Checkout error: No payment link returned.");
      return;
    }

    window.location.href = data.url;

  } catch (err) {
    console.error(err);
    alert("Checkout failed. Server not responding.");
  }
}

document.getElementById("buyBtn").addEventListener("click", startCheckout);
</script>

</body>
</html>
