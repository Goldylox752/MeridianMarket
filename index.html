<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoofFlow Store</title>

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#0a0c15;
  color:white;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}

.card{
  background:#111827;
  border-radius:18px;
  padding:15px;
}

img{
  width:100%;
  border-radius:12px;
  height:160px;
  object-fit:cover;
}

.price{
  color:#4ade80;
  font-weight:800;
  font-size:18px;
}

.btn{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:700;
}

.buy{
  background:#2563eb;
  color:white;
}

.stock{
  font-size:12px;
  opacity:.7;
}
</style>
</head>

<body>

<div class="container">

<h1>RoofFlow Store</h1>
<p>Professional tools for contractors</p>

<div id="products" class="grid"></div>

</div>

<script>
const API = "https://YOUR-BACKEND.com";

/* LOAD PRODUCTS */
async function loadProducts(){
  const res = await fetch(`${API}/products`);
  const products = await res.json();

  const container = document.getElementById("products");

  container.innerHTML = products.map(p => `
    <div class="card">
      <img src="${p.image_url}" />
      <h3>${p.name}</h3>
      <p>${p.description}</p>

      <div class="price">$${p.price}</div>
      <div class="stock">Stock: ${p.stock}</div>

      <button class="btn buy" onclick="buy('${p.sku}')">
        Buy Now
      </button>
    </div>
  `).join("");
}

/* BUY PRODUCT */
async function buy(sku){
  const res = await fetch(`${API}/create-checkout`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ sku })
  });

  const data = await res.json();
  window.location.href = data.url;
}

loadProducts();
</script>

</body>
</html>
