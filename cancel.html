<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Checkout Cancelled | Skymaster X1</title>
<meta name="description" content="Your Skymaster X1 purchase was cancelled. Return anytime to complete your order." />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: 'Inter', sans-serif;
  background: #0a0c15;
  color: #f0f3fa;
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.container {
  max-width: 600px;
  width: 100%;
  text-align: center;
}
.cancel-card {
  background: #0f111a;
  border-radius: 48px;
  padding: 48px 32px;
  border: 1px solid #1e293b;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
}
.icon-circle {
  background: rgba(239,68,68,0.15);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
}
.icon-circle i {
  font-size: 2.5rem;
  color: #f87171;
}
h1 {
  font-size: 2.2rem;
  font-weight: 800;
  margin-bottom: 16px;
  background: linear-gradient(135deg, #FFFFFF, #cbd5e1);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
p {
  color: #94a3b8;
  margin-bottom: 32px;
  font-size: 1.1rem;
}
.btn-group {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  justify-content: center;
  margin-bottom: 32px;
}
.btn {
  display: inline-block;
  font-weight: 700;
  text-align: center;
  padding: 14px 28px;
  border-radius: 60px;
  text-decoration: none;
  transition: all 0.2s ease;
  font-size: 1rem;
  border: none;
  cursor: pointer;
}
.btn-primary {
  background: #2563eb;
  color: white;
  box-shadow: 0 8px 20px rgba(37,99,235,0.3);
}
.btn-primary:hover {
  background: #1d4ed8;
  transform: translateY(-2px);
}
.btn-outline {
  border: 1.5px solid #60a5fa;
  background: transparent;
  color: #e0e7ff;
}
.btn-outline:hover {
  background: rgba(96,165,250,0.1);
}
.whatsapp-link {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: #86efac;
  text-decoration: none;
  font-weight: 500;
  margin-top: 16px;
  padding: 8px 16px;
  border-radius: 40px;
  background: rgba(34,197,94,0.1);
  transition: all 0.2s ease;
}
.whatsapp-link i {
  font-size: 1.2rem;
  color: #25D366;
}
.whatsapp-link:hover {
  background: rgba(34,197,94,0.2);
}
.footer {
  margin-top: 24px;
  font-size: 0.75rem;
  color: #4b5563;
}
</style>
</head>
<body>
<div class="container">
  <div class="cancel-card">
    <div class="icon-circle">
      <i class="fas fa-times-circle"></i>
    </div>
    <h1>Payment Cancelled</h1>
    <p>Your transaction was not completed. No charges have been made.<br>You can return and complete your purchase anytime.</p>
    <div class="btn-group">
      <a href="/" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Return to Skymaster X1</a>
      <a href="/" class="btn btn-outline"><i class="fas fa-shopping-cart"></i> Try again</a>
    </div>
    <a href="#" id="whatsappCancelLink" class="whatsapp-link" target="_blank">
      <i class="fab fa-whatsapp"></i> Need help? Chat with support
    </a>
  </div>
  <div class="footer">
    <p>© 2026 Skymaster | Secure checkout powered by Stripe</p>
  </div>
</div>

<script>
// Obfuscated phone number (same as main page)
(function() {
  const encoded = "37697620871"; // reverse of "17802679673"
  const phoneNumber = encoded.split('').reverse().join('');
  const waLink = document.getElementById('whatsappCancelLink');
  if (waLink) {
    waLink.href = `https://wa.me/${phoneNumber}?text=Hello%2C%20I%20had%20an%20issue%20with%20my%20checkout%20cancellation.%20Can%20you%20help%3F`;
  }
})();
</script>
</body>
</html>
