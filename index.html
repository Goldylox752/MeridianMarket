<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Meridian Market — AI Commerce Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#070A12;
  --panel:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#EAF2FF;
  --muted:rgba(234,242,255,0.65);
  --blue:#3b82f6;
  --green:#22c55e;
  --gold:#fbbf24;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Inter,sans-serif;
  background:radial-gradient(circle at top,#111a33,var(--bg));
  color:var(--text);
}

/* TOP STATUS BAR */
.topbar{
  padding:10px;
  text-align:center;
  font-size:12px;
  background:#0f172a;
  border-bottom:1px solid var(--border);
  letter-spacing:.3px;
}

/* HEADER */
.header{
  max-width:1100px;
  margin:auto;
  padding:50px 20px 20px;
  text-align:center;
}

.header h1{
  font-size:40px;
  font-weight:800;
}

.header p{
  color:var(--muted);
  margin-top:10px;
}

/* GRID */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#111827,#0f172a);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  transition:.25s;
  display:flex;
  flex-direction:column;
}

.card:hover{
  transform:translateY(-5px);
  border-color:#3b82f655;
}

.img{
  width:100%;
  height:190px;
  object-fit:cover;
  background:#0b1220;
}

.content{
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.title{
  font-size:15px;
  font-weight:700;
}

.desc{
  font-size:12px;
  color:var(--muted);
  line-height:1.4;
}

/* ROW */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.price{
  color:var(--green);
  font-weight:800;
  font-size:16px;
}

.score{
  font-size:11px;
  color:#93c5fd;
}

/* TAGS */
.tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.tag{
  font-size:10px;
  padding:4px 8px;
  border-radius:999px;
  background:#1f2937;
  color:var(--muted);
}

.winner{
  background:#064e3b;
  color:#34d399;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
  background:var(--blue);
  color:white;
  transition:.2s;
}

button:hover{
  background:#2563eb;
  transform:translateY(-1px);
}

button:disabled{
  background:#374151;
  cursor:not-allowed;
}

/* LOADING */
.skeleton{
  height:270px;
  border-radius:16px;
  background:linear-gradient(90deg,#111827,#1f2937,#111827);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
}

@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  font-size:12px;
  color:var(--muted);
  border-top:1px solid var(--border);
}
</style>
</head>

<body>

<div class="topbar">
  🤖 Meridian Market AI Engine • Real-time product scoring • Automated commerce system
</div>

<div class="header">
  <h1>Meridian Market</h1>
  <p>AI discovers, scores, and sells high-margin products automatically</p>
</div>

<div class="container">
  <div id="products" class="grid">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<footer>
  © 2026 Meridian Market — Autonomous Commerce Intelligence System
</footer>

<script>
const API = "https://YOUR-BACKEND.com";

/* LOAD PRODUCTS */
async function loadProducts(){
  try{
    const res = await fetch(API + "/products");
    const products = await res.json();

    const el = document.getElementById("products");

    el.innerHTML = products.map(p => {
      const lowStock = p.stock <= 5;
      const winner = p.score && p.score > 80;

      return `
        <div class="card">

          <img class="img" src="${p.image_url}" />

          <div class="content">

            <div class="title">${escape(p.name)}</div>
            <div class="desc">${escape(p.description || "")}</div>

            <div class="row">
              <div class="price">$${Number(p.price).toFixed(2)}</div>
              <div class="score">Score: ${p.score || "N/A"}</div>
            </div>

            <div class="tags">
              <div class="tag">${lowStock ? "Low Stock" : "In Stock"}</div>
              ${winner ? `<div class="tag winner">WINNER</div>` : ""}
            </div>

            <button onclick="buy('${p.sku}')" ${p.stock<=0?'disabled':''}>
              ${p.stock<=0 ? "Sold Out" : "Buy Now"}
            </button>

          </div>
        </div>
      `;
    }).join("");

  } catch(err){
    document.getElementById("products").innerHTML =
      "<p style='text-align:center;opacity:.6'>Failed to load products</p>";
  }
}

/* BUY */
async function buy(sku){
  const res = await fetch(API + "/create-checkout", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ sku })
  });

  const data = await res.json();

  if(data.url){
    window.location.href = data.url;
  }
}

/* SAFE ESCAPE */
function escape(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

loadProducts();
</script>

</body>
</html>
