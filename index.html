<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meridian Market — AI Sales Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#0a0c0f;
  --surface:#141820;
  --border:rgba(255,255,255,.08);
  --text:#e8edf5;
  --muted:#8a97ab;
  --accent:#00e5a0;
}

/* BASE */
body{
  margin:0;
  font-family:Syne, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:18px 24px;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  background:rgba(10,12,15,.9);
  backdrop-filter:blur(20px);
}
.logo{font-weight:800}
.logo span{color:var(--muted)}

/* HERO */
.hero{
  max-width:900px;
  margin:auto;
  padding:90px 24px;
}
.hero h1{
  font-size:56px;
  line-height:1;
}
.hero p{
  color:var(--muted);
  margin-top:14px;
}

/* CHAT BUTTON */
.chat-bubble{
  position:fixed;
  bottom:24px;
  right:24px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-weight:800;
  color:#000;
  box-shadow:0 10px 30px rgba(0,229,160,.3);
  z-index:9999;
}

/* CHAT WINDOW */
.chat-window{
  position:fixed;
  bottom:100px;
  right:24px;
  width:380px;
  height:540px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:9999;
}

.chat-window.open{display:flex}

.chat-header{
  padding:14px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.chat-title{font-weight:700}
.chat-close{cursor:pointer;color:var(--muted)}

/* MESSAGES */
.chat-body{
  flex:1;
  padding:14px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:80%;
  padding:10px 12px;
  border-radius:10px;
  font-size:13px;
}

.user{
  background:#1f2937;
  align-self:flex-end;
}

.ai{
  background:rgba(0,229,160,.1);
  border:1px solid rgba(0,229,160,.2);
  align-self:flex-start;
}

/* INPUT */
.chat-input{
  display:flex;
  border-top:1px solid var(--border);
}

.chat-input input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
  background:#0f131a;
  color:var(--text);
}

.chat-input button{
  background:var(--accent);
  border:none;
  padding:0 16px;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Meridian <span>AI Sales</span></div>
</nav>

<section class="hero">
  <h1>AI That Sells For You<br>24/7 On Your Website</h1>
  <p>
    Replace chat tools like Intercom with an AI sales agent that qualifies visitors,
    collects leads, and books calls automatically.
  </p>
</section>

<!-- FLOAT CHAT BUTTON -->
<div class="chat-bubble" onclick="toggleChat()">AI</div>

<!-- CHAT WINDOW -->
<div class="chat-window" id="chatWindow">

  <div class="chat-header">
    <div class="chat-title">Meridian AI Sales</div>
    <div class="chat-close" onclick="toggleChat()">✕</div>
  </div>

  <div class="chat-body" id="chatBody">
    <div class="msg ai">Hey 👋 I can help you find winning products or book a demo. What are you looking for?</div>
  </div>

  <div class="chat-input">
    <input id="input" placeholder="Type a message..." />
    <button onclick="sendMsg()">Send</button>
  </div>

</div>

<script>
const chatWindow = document.getElementById("chatWindow");
const chatBody = document.getElementById("chatBody");
const input = document.getElementById("input");

/* 🔥 LEAD STATE */
let lead = {
  email: null,
  stage: 0,
  intent: "cold"
};

function toggleChat(){
  chatWindow.classList.toggle("open");
}

/* ADD MESSAGE */
function addMsg(text, type){
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  div.innerText = text;
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
}

/* INTENT ENGINE */
function detectIntent(text){
  text = text.toLowerCase();
  if(text.includes("book") || text.includes("call")) return "hot";
  if(text.includes("price") || text.includes("cost")) return "buy";
  if(text.includes("how") || text.includes("works")) return "warm";
  return "cold";
}

/* 🔥 AI SALES ENGINE */
function salesEngine(text){

  const intent = detectIntent(text);
  lead.intent = intent;

  /* STAGE 0 — QUALIFY */
  if(lead.stage === 0){
    lead.stage++;

    if(intent === "hot"){
      return "Perfect — I can get you booked. What’s your email?";
    }

    return "Are you trying to find winning products or book a demo call?";
  }

  /* STAGE 1 — EMAIL CAPTURE */
  if(lead.stage === 1){
    if(text.includes("@")){
      lead.email = text;
      lead.stage++;
      return "Got it. Want me to show top winning products or book your strategy call?";
    }
    return "Drop your email so I can send results.";
  }

  /* STAGE 2 — CLOSE */
  if(lead.stage === 2){
    if(intent === "hot" || text.includes("book")){
      return "Done. Book your call here 👇\nhttps://calendly.com/your-link";
    }
    return "I recommend starting with a free strategy call — want me to book you in?";
  }

  return "Tell me what you're trying to achieve — I’ll guide you.";
}

/* SEND MESSAGE */
function sendMsg(){
  const text = input.value;
  if(!text) return;

  addMsg(text, "user");
  input.value = "";

  addMsg("Thinking...", "ai");

  setTimeout(() => {
    chatBody.lastChild.remove();
    const reply = salesEngine(text);
    addMsg(reply, "ai");
  }, 600);
}
</script>

</body>
</html>
